<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Master News</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}

header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

header button{
    background:#00c853;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.container{
    max-width:1200px;
    margin:20px auto;
    padding:0 15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    flex:1;
}

.card button{
    margin-top:10px;
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#2196f3;
    color:white;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:400px;
    border-radius:10px;
}

.modal-content input,
.modal-content textarea{
    width:100%;
    margin-bottom:10px;
    padding:8px;
}

.close{
    background:#f44336;
    color:white;
}

#singleView{
    display:none;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

#singleView img{
    width:100%;
    max-height:400px;
    object-fit:cover;
    margin-bottom:20px;
}
</style>
</head>

<body>

<header>
    <h1>Portal Master News</h1>
    <button onclick="openModal()">Criar Notícia</button>
</header>

<div class="container">

<div id="homeView">
    <div class="grid" id="newsContainer"></div>
</div>

<div id="singleView"></div>

</div>

<div class="modal" id="newsModal">
    <div class="modal-content">
        <h2>Nova Notícia</h2>
        <input type="text" id="title" placeholder="Título">
        <textarea id="content" placeholder="Conteúdo completo"></textarea>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="saveNews()">Salvar</button>
        <button class="close" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
let news = JSON.parse(localStorage.getItem("news")) || [];

function renderNews(){
    const container = document.getElementById("newsContainer");
    container.innerHTML = "";
    news.forEach((item,index)=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML = `
            ${item.image ? `<img src="${item.image}">` : ""}
            <div class="card-content">
                <h3>${item.title}</h3>
                <p>${item.content.substring(0,80)}...</p>
                <button onclick="viewNews(${index})">Ler mais</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function viewNews(index){
    const item = news[index];
    document.getElementById("homeView").style.display="none";
    const single = document.getElementById("singleView");
    single.style.display="block";
    single.innerHTML = `
        ${item.image ? `<img src="${item.image}">` : ""}
        <h2>${item.title}</h2>
        <p>${item.content}</p>
        <button onclick="goBack()">Voltar</button>
    `;
}

function goBack(){
    document.getElementById("singleView").style.display="none";
    document.getElementById("homeView").style.display="block";
}

function openModal(){
    document.getElementById("newsModal").style.display="flex";
}

function closeModal(){
    document.getElementById("newsModal").style.display="none";
    document.getElementById("title").value="";
    document.getElementById("content").value="";
}

function saveNews(){
    const title=document.getElementById("title").value;
    const content=document.getElementById("content").value;
    const imageInput=document.getElementById("imageInput");

    if(!title || !content) return alert("Preencha tudo!");

    if(imageInput.files[0]){
        const reader=new FileReader();
        reader.onload=function(e){
            addNews(e.target.result);
        }
        reader.readAsDataURL(imageInput.files[0]);
    }else{
        addNews(null);
    }

    function addNews(image){
        news.push({title,content,image});
        localStorage.setItem("news",JSON.stringify(news));
        closeModal();
        renderNews();
    }
}

renderNews();
</script>

</body>
</html>
