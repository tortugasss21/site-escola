<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Master News</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f0f2f5;
}

header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
}

header button{
    background:#00c853;
    border:none;
    padding:10px 15px;
    color:white;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

.container{
    max-width:1200px;
    margin:20px auto;
    padding:0 15px;
}

.search{
    margin-bottom:20px;
}

.search input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    flex:1;
}

.card h3{
    margin-top:0;
}

.card small{
    color:gray;
}

.card button{
    margin-right:5px;
    margin-top:10px;
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.edit{ background:#ff9800; color:white;}
.delete{ background:#f44336; color:white;}
.feature{ background:#2196f3; color:white;}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:400px;
    border-radius:10px;
}

.modal-content input,
.modal-content textarea,
.modal-content select{
    width:100%;
    margin-bottom:10px;
    padding:8px;
}

.close{
    background:#f44336;
    color:white;
}

.highlight{
    border:3px solid gold;
}
</style>
</head>

<body>

<header>
    <h1>Portal Master News</h1>
    <button onclick="openModal()">Criar Nova Notícia</button>
</header>

<div class="container">

<div class="search">
    <input type="text" id="searchInput" placeholder="Buscar notícias..." onkeyup="searchNews()">
</div>

<div class="grid" id="newsContainer"></div>

</div>

<div class="modal" id="newsModal">
    <div class="modal-content">
        <h2 id="modalTitle">Nova Notícia</h2>
        <input type="text" id="title" placeholder="Título">
        <textarea id="content" placeholder="Conteúdo"></textarea>
        <select id="category">
            <option value="Brasil">Brasil</option>
            <option value="Mundo">Mundo</option>
            <option value="Tecnologia">Tecnologia</option>
            <option value="Esportes">Esportes</option>
        </select>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="saveNews()">Salvar</button>
        <button class="close" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script>
let news = JSON.parse(localStorage.getItem("news")) || [];
let editIndex = null;

function renderNews(){
    const container = document.getElementById("newsContainer");
    container.innerHTML = "";
    news.forEach((item,index)=>{
        const card = document.createElement("div");
        card.className="card";
        if(item.highlight) card.classList.add("highlight");

        card.innerHTML = `
            ${item.image ? `<img src="${item.image}">` : ""}
            <div class="card-content">
                <h3>${item.title}</h3>
                <small>${item.category}</small>
                <p>${item.content.substring(0,100)}...</p>
                <button class="edit" onclick="editNews(${index})">Editar</button>
                <button class="delete" onclick="deleteNews(${index})">Excluir</button>
                <button class="feature" onclick="highlightNews(${index})">Destaque</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function openModal(){
    document.getElementById("newsModal").style.display="flex";
}

function closeModal(){
    document.getElementById("newsModal").style.display="none";
    document.getElementById("title").value="";
    document.getElementById("content").value="";
    editIndex=null;
}

function saveNews(){
    const title=document.getElementById("title").value;
    const content=document.getElementById("content").value;
    const category=document.getElementById("category").value;
    const imageInput=document.getElementById("imageInput");

    if(!title || !content) return alert("Preencha todos os campos!");

    if(imageInput.files[0]){
        const reader=new FileReader();
        reader.onload=function(e){
            saveData(e.target.result);
        }
        reader.readAsDataURL(imageInput.files[0]);
    }else{
        saveData(null);
    }

    function saveData(image){
        const data={title,content,category,image,highlight:false};
        if(editIndex!==null){
            news[editIndex]=data;
        }else{
            news.push(data);
        }
        localStorage.setItem("news",JSON.stringify(news));
        closeModal();
        renderNews();
    }
}

function editNews(index){
    editIndex=index;
    const item=news[index];
    document.getElementById("title").value=item.title;
    document.getElementById("content").value=item.content;
    document.getElementById("category").value=item.category;
    openModal();
}

function deleteNews(index){
    if(confirm("Excluir notícia?")){
        news.splice(index,1);
        localStorage.setItem("news",JSON.stringify(news));
        renderNews();
    }
}

function highlightNews(index){
    news.forEach(n=>n.highlight=false);
    news[index].highlight=true;
    localStorage.setItem("news",JSON.stringify(news));
    renderNews();
}

function searchNews(){
    const term=document.getElementById("searchInput").value.toLowerCase();
    const cards=document.querySelectorAll(".card");
    cards.forEach((card,i)=>{
        const title=news[i].title.toLowerCase();
        card.style.display=title.includes(term)?"block":"none";
    });
}

renderNews();
</script>

</body>
</html>
